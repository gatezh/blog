name: Build Devcontainer Image

on:
  push:
    branches: [master]
    paths:
      - '.devcontainer/Dockerfile'
      - '.mise.toml'
  workflow_dispatch:
    inputs:
      bun_version:
        description: 'Bun version (e.g., 1.3.8). Empty = keep current.'
        required: false
        type: string
      node_version:
        description: 'Node version (e.g., 20). Empty = keep current.'
        required: false
        type: string
      hugo_version:
        description: 'Hugo version (e.g., 0.155.1). Empty = keep current.'
        required: false
        type: string
      update_only:
        description: 'Only update .mise.toml without building image'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devcontainer

jobs:
  update-versions:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.bun_version != '' || inputs.node_version != '' || inputs.hugo_version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update .mise.toml
        id: update
        env:
          INPUT_BUN: ${{ inputs.bun_version }}
          INPUT_NODE: ${{ inputs.node_version }}
          INPUT_HUGO: ${{ inputs.hugo_version }}
        run: |
          CURRENT_BUN=$(grep '^bun' .mise.toml | sed 's/.*"\(.*\)"/\1/')
          CURRENT_NODE=$(grep '^node' .mise.toml | sed 's/.*"\(.*\)"/\1/')
          CURRENT_HUGO=$(grep '^hugo' .mise.toml | sed 's/.*"\(.*\)"/\1/')

          NEW_BUN=${INPUT_BUN:-$CURRENT_BUN}
          NEW_NODE=${INPUT_NODE:-$CURRENT_NODE}
          NEW_HUGO=${INPUT_HUGO:-$CURRENT_HUGO}

          echo "Current: bun=$CURRENT_BUN node=$CURRENT_NODE hugo=$CURRENT_HUGO"
          echo "Target:  bun=$NEW_BUN node=$NEW_NODE hugo=$NEW_HUGO"

          sed -i "s/^bun = .*/bun = \"$NEW_BUN\"/" .mise.toml
          sed -i "s/^node = .*/node = \"$NEW_NODE\"/" .mise.toml
          sed -i "s/^hugo-extended = .*/hugo-extended = \"$NEW_HUGO\"/" .mise.toml

          if git diff --quiet .mise.toml; then
            echo "No changes — versions already match"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "Versions updated"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .mise.toml
          git commit \
            -m "chore: update tool versions in .mise.toml" \
            -m "Co-Authored-By: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>"
          git push

  build-and-push:
    needs: update-versions
    # Run unless: update-versions failed, workflow was cancelled, or update_only was checked
    if: ${{ always() && needs.update-versions.result != 'failure' && inputs.update_only != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Pull latest in case update-versions just pushed a commit
      - run: git pull

      - name: Generate image tags
        id: tags
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BASE="${{ env.REGISTRY }}/${REPO}/${{ env.IMAGE_NAME }}"
          COMMIT_SHA=${{ github.sha }}
          COMMIT_SHORT=${COMMIT_SHA:0:7}
          BUILD_DATE=$(date -u +'%Y-%m-%d')

          TAGS="${BASE}:latest,${BASE}:${COMMIT_SHORT},${BASE}:${BUILD_DATE}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${BASE}:latest"
          echo "       ${BASE}:${COMMIT_SHORT}"
          echo "       ${BASE}:${BUILD_DATE}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          TAG=$(echo "${{ steps.tags.outputs.tags }}" | cut -d',' -f1)
          echo "Verifying: $TAG"

          docker pull --platform linux/amd64 "$TAG"
          docker pull --platform linux/arm64 "$TAG"

          echo "--- amd64 ---"
          docker run --rm --platform linux/amd64 "$TAG" bun --version
          docker run --rm --platform linux/amd64 "$TAG" node --version
          docker run --rm --platform linux/amd64 "$TAG" hugo version

          echo "--- arm64 ---"
          docker run --rm --platform linux/arm64 "$TAG" bun --version
          docker run --rm --platform linux/arm64 "$TAG" node --version
          docker run --rm --platform linux/arm64 "$TAG" hugo version

          echo "Image verified successfully"
