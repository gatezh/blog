services:
  app:
    # Pre-built image from GitHub Container Registry
    # To build locally instead: comment out "image" and uncomment "build"
    # image: ghcr.io/gatezh/blog/devcontainer:latest
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        CLAUDE_CODE_VERSION: latest
        AGENT_BROWSER_VERSION: "0.14.0"
    volumes:
      - ..:/workspace:cached
      # Persist node_modules to avoid host/container binary mismatches
      - node_modules:/workspace/node_modules
      - node_modules_www:/workspace/services/www/node_modules
      - node_modules_worker:/workspace/services/email-worker/node_modules
      # Persist Claude Code config (auth tokens, settings) across container rebuilds
      - claude_config:/root/.claude
    # Keep container running for devcontainer
    command: sleep infinity

volumes:
  node_modules:
  node_modules_www:
  node_modules_worker:
  claude_config:
